<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Up — LLM Agents &amp; Claude Desktop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,340;0,9..144,560;1,9..144,340&family=Hanken+Grotesk:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000; overflow: hidden; }
  .viewport { position: fixed; inset: 0; display: grid; place-items: center; background: #000; }
  .stage { width: 1920px; height: 1080px; position: relative; background: #050a0a; overflow: hidden; transform-origin: center;
    font-family: 'Hanken Grotesk', sans-serif; }

  /* single huge elliptical light ring, slowly orbiting */
  .orbit { position: absolute; width: 2300px; height: 1500px; left: -240px; top: -560px;
    border: 1.5px solid rgba(94,234,212,0.16); border-radius: 50%; transform: rotate(-16deg);
    animation: orbit 38s linear infinite; }
  .orbit::after { content: ''; position: absolute; width: 200px; height: 200px; border-radius: 50%;
    left: 12%; bottom: 4%; background: rgba(94,234,212,0.5); filter: blur(90px); }
  .orbit.o2 { width: 2600px; height: 1700px; left: -400px; top: -640px; border-color: rgba(94,234,212,0.07); animation-duration: 55s; animation-direction: reverse; }
  @keyframes orbit { to { transform: rotate(-12deg); } }
  .haze { position: absolute; inset: 0; background:
    radial-gradient(ellipse 1000px 700px at 78% 88%, rgba(13,148,136,0.16), transparent 65%),
    radial-gradient(ellipse 800px 500px at 12% 6%, rgba(13,148,136,0.10), transparent 60%); }

  .grid { position: absolute; left: 150px; right: 150px; top: 0; bottom: 0; display: flex; flex-direction: column; justify-content: center; }

  .overline { display: flex; align-items: center; gap: 26px; font-family: 'Space Mono', monospace; font-size: 22px;
    letter-spacing: 7px; color: #5eead4; opacity: 0; animation: appear 1s ease 0.2s forwards; }
  .overline::before { content: ''; width: 70px; height: 1px; background: rgba(94,234,212,0.7); }
  .overline .n { color: #46665f; }

  h1 { font-family: 'Fraunces', serif; color: #ece9e2; margin-top: 52px; font-size: 148px; line-height: 1.02;
    font-weight: 340; letter-spacing: -1px; }
  h1 .row { display: block; overflow: hidden; }
  h1 .row span { display: inline-block; transform: translateY(110%); animation: lift 1.1s cubic-bezier(.16,1,.3,1) forwards; }
  h1 .row:nth-child(1) span { animation-delay: 0.35s; }
  h1 .row:nth-child(2) span { animation-delay: 0.5s; }
  h1 .row:nth-child(3) span { animation-delay: 0.65s; }
  h1 em { font-style: italic; color: #5eead4; font-weight: 340; }
  h1 strong { font-weight: 560; }

  .rule { margin-top: 64px; height: 1px; width: 0; background: linear-gradient(90deg, rgba(94,234,212,0.6), rgba(94,234,212,0.05));
    animation: grow 1.2s ease 1.1s forwards; }
  .meta { margin-top: 34px; display: flex; justify-content: space-between; align-items: baseline;
    opacity: 0; animation: appear 1s ease 1.35s forwards; }
  .meta .sub { font-size: 33px; font-weight: 300; color: #93b3ad; }
  .meta .sub b { color: #e8f4f2; font-weight: 600; }
  .meta .by { text-align: right; font-size: 25px; color: #93b3ad; line-height: 1.6; }
  .meta .by .nm { color: #ece9e2; font-weight: 600; }
  .meta .by .mono { font-family: 'Space Mono', monospace; font-size: 19px; color: #46665f; letter-spacing: 2px; }

  @keyframes appear { to { opacity: 1; } }
  @keyframes lift { to { transform: none; } }
  @keyframes grow { to { width: 100%; } }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01s !important; animation-delay: 0s !important; }
  }
</style>
</head>
<body>
<div class="viewport">
  <div class="stage" id="stage">
    <div class="haze"></div>
    <div class="orbit"></div>
    <div class="orbit o2"></div>
    <div class="grid">
      <div class="overline">A LECTURE ON MODERN TOOLING<span class="n">— ARIEL UNIVERSITY, CS DEPT.</span></div>
      <h1>
        <span class="row"><span><em>Level up:</em></span></span>
        <span class="row"><span>LLM agents &amp;</span></span>
        <span class="row"><span><strong>Claude Desktop</strong></span></span>
      </h1>
      <div class="rule"></div>
      <div class="meta">
        <div class="sub">Your day-to-day CS workflow, automated — <b>skills</b>, <b>plugins</b> &amp; <b>MCP</b></div>
        <div class="by">
          <div class="nm">Edward Kisller</div>
          <div class="mono">SOLUTIONS DEV · CLIMBER · DAD ×2</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  function fit() {
    var s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    document.getElementById('stage').style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fit); fit();
</script>
</body>
</html>
