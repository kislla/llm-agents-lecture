<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Up — LLM Agents &amp; Claude Desktop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Gantari:wght@300;400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000; overflow: hidden; }
  .viewport { position: fixed; inset: 0; display: grid; place-items: center; background: #000; }
  .stage { width: 1920px; height: 1080px; position: relative; background: #05090a; overflow: hidden; transform-origin: center; font-family: 'Gantari', sans-serif; }

  /* atmosphere: teal radial glows + light rings */
  .glow { position: absolute; border-radius: 50%; filter: blur(120px); }
  .glow.g1 { width: 1100px; height: 800px; left: -250px; top: -300px; background: rgba(13,148,136,0.14); }
  .glow.g2 { width: 900px; height: 700px; right: -200px; bottom: -250px; background: rgba(45,212,191,0.10); }
  .ring { position: absolute; border: 1px solid rgba(94,234,212,0.10); border-radius: 50%; }
  .ring.r1 { width: 1600px; height: 1600px; left: -500px; top: 240px; animation: drift 26s linear infinite alternate; }
  .ring.r2 { width: 1300px; height: 1300px; right: -420px; top: -700px; animation: drift 32s linear infinite alternate-reverse; }
  @keyframes drift { to { transform: translate(40px, -30px) scale(1.03); } }

  /* edge-lit frame */
  .frame { position: absolute; inset: 56px; border: 1px solid rgba(45,212,191,0.22); border-radius: 36px; }
  .frame::before, .frame::after { content: ''; position: absolute; width: 220px; height: 220px; border-radius: 50%; filter: blur(46px); background: rgba(94,234,212,0.22); }
  .frame::before { top: -110px; left: 80px; }
  .frame::after { bottom: -110px; right: 80px; background: rgba(45,212,191,0.16); }
  .sweep { position: absolute; top: 55px; left: 15%; width: 360px; height: 2px; border-radius: 2px;
    background: linear-gradient(90deg, transparent, rgba(94,234,212,0.85), transparent);
    animation: sweep 7s ease-in-out infinite; }
  @keyframes sweep { 0% { left: 6%; opacity: 0; } 12% { opacity: 1; } 50% { left: 72%; opacity: 1; } 62% { opacity: 0; } 100% { left: 72%; opacity: 0; } }

  /* hex node cluster (top right) */
  .hexes { position: absolute; top: 120px; right: 130px; opacity: 0; animation: rise 1s ease-out 0.9s forwards; }
  .hexes path.h { fill: rgba(13,148,136,0.10); stroke: rgba(94,234,212,0.55); stroke-width: 1.5; }
  .hexes path.h.dim { stroke: rgba(94,234,212,0.22); }
  .hexes line { stroke: rgba(232,244,242,0.5); stroke-width: 1.5; stroke-dasharray: 5 7; stroke-dashoffset: 200; animation: dash 2.4s ease-out 1.2s forwards; }
  @keyframes dash { to { stroke-dashoffset: 0; } }

  /* content */
  .content { position: absolute; left: 150px; top: 0; height: 100%; display: flex; flex-direction: column; justify-content: center; max-width: 1280px; }
  .pill { display: inline-flex; align-items: center; gap: 14px; width: fit-content; padding: 14px 30px; border: 1px solid rgba(94,234,212,0.35); border-radius: 999px;
    background: linear-gradient(105deg, rgba(13,148,136,0.22), rgba(13,148,136,0.05));
    font-family: 'JetBrains Mono', monospace; font-size: 21px; letter-spacing: 5px; color: #5eead4;
    opacity: 0; animation: rise 0.8s ease-out 0.15s forwards; }
  .pill .dot { width: 11px; height: 11px; border-radius: 50%; background: #5eead4; box-shadow: 0 0 14px #2dd4bf; animation: pulse 2.4s infinite; }
  @keyframes pulse { 50% { opacity: 0.45; } }

  h1 { font-family: 'Chakra Petch', sans-serif; font-weight: 700; color: #e8f4f2; margin-top: 44px;
    font-size: 124px; line-height: 1.04; letter-spacing: 1px;
    text-shadow: 0 0 60px rgba(45,212,191,0.25); opacity: 0; animation: rise 0.9s ease-out 0.4s forwards; }
  h1 .accent { color: #2dd4bf; text-shadow: 0 0 44px rgba(45,212,191,0.55); }
  .sub { margin-top: 36px; font-size: 36px; font-weight: 300; color: #9fbeb9; max-width: 1080px; line-height: 1.5;
    opacity: 0; animation: rise 0.9s ease-out 0.7s forwards; }
  .sub b { color: #5eead4; font-weight: 600; }

  .footer { position: absolute; left: 150px; right: 150px; bottom: 110px; display: flex; justify-content: space-between; align-items: center;
    opacity: 0; animation: rise 0.9s ease-out 1.15s forwards; }
  .who { display: flex; align-items: center; gap: 20px; }
  .avatar { width: 64px; height: 64px; border-radius: 18px; border: 1px solid rgba(94,234,212,0.5);
    background: linear-gradient(140deg, rgba(13,148,136,0.4), rgba(5,9,10,0.6)); display: grid; place-items: center;
    color: #5eead4; font-family: 'Chakra Petch', sans-serif; font-weight: 600; font-size: 24px; }
  .who .name { color: #e8f4f2; font-size: 27px; font-weight: 600; }
  .who .role { color: #6e8f8a; font-size: 21px; }
  .kbd { font-family: 'JetBrains Mono', monospace; color: #6e8f8a; font-size: 20px; letter-spacing: 2px; }
  .kbd span { border: 1px solid rgba(110,143,138,0.45); border-radius: 8px; padding: 4px 12px; margin-left: 8px; }

  @keyframes rise { from { opacity: 0; transform: translateY(26px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01s !important; animation-delay: 0s !important; }
  }
</style>
</head>
<body>
<div class="viewport">
  <div class="stage" id="stage">
    <div class="glow g1"></div><div class="glow g2"></div>
    <div class="ring r1"></div><div class="ring r2"></div>
    <div class="frame"></div>
    <div class="sweep"></div>

    <svg class="hexes" width="460" height="320" viewBox="0 0 460 320">
      <line x1="120" y1="160" x2="265" y2="86"/>
      <line x1="120" y1="160" x2="265" y2="236"/>
      <line x1="265" y1="86" x2="392" y2="160"/>
      <line x1="265" y1="236" x2="392" y2="160"/>
      <path class="h" d="M120 110 l43 25 v50 l-43 25 -43 -25 v-50 z"/>
      <path class="h dim" d="M265 46 l35 20 v40 l-35 20 -35 -20 v-40 z"/>
      <path class="h dim" d="M265 196 l35 20 v40 l-35 20 -35 -20 v-40 z"/>
      <path class="h" d="M392 120 l35 20 v40 l-35 20 -35 -20 v-40 z"/>
    </svg>

    <div class="content">
      <div class="pill"><span class="dot"></span>ARIEL UNIVERSITY · CS LECTURE</div>
      <h1>Level Up:<br>LLM Agents &amp;<br><span class="accent">Claude Desktop</span></h1>
      <p class="sub">Automating your day-to-day CS workflow with <b>Skills</b>, <b>Plugins</b>, and <b>MCP</b></p>
    </div>

    <div class="footer">
      <div class="who">
        <div class="avatar">EK</div>
        <div>
          <div class="name">Edward Kisller</div>
          <div class="role">Senior Solutions Developer · Sport Climbing Instructor</div>
        </div>
      </div>
      <div class="kbd">navigate<span>→</span></div>
    </div>
  </div>
</div>
<script>
  function fit() {
    var s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    document.getElementById('stage').style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fit); fit();
</script>
</body>
</html>
